name: Build and Deploy Backend

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/taskrit-backend
  CONTAINER_NAME: taskrit-backend
  CONTAINER_PORT: 3000
  MONGO_CONTAINER_NAME: taskrit-mongodb
  MONGO_VOLUME_NAME: taskrit-mongodb-data

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.MONGODB_USER }}" ]; then
            echo "::error::Missing required secret: MONGODB_USER"
            exit 1
          fi
          if [ -z "${{ secrets.MONGODB_PASSWORD }}" ]; then
            echo "::error::Missing required secret: MONGODB_PASSWORD"
            exit 1
          fi
          if [ -z "${{ secrets.JWT_ACCESS_SECRET }}" ]; then
            echo "::error::Missing required secret: JWT_ACCESS_SECRET"
            exit 1
          fi
          if [ -z "${{ secrets.JWT_REFRESH_SECRET }}" ]; then
            echo "::error::Missing required secret: JWT_REFRESH_SECRET"
            exit 1
          fi

      - name: Configure SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          timeout 15s ssh-keyscan -T 5 -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy on server
        shell: bash
        run: |
          set -euo pipefail
          ssh -o BatchMode=yes -o ConnectTimeout=15 -o StrictHostKeyChecking=accept-new -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" << 'EOF'
            set -e
            docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" -p "${{ secrets.GHCR_PAT }}"
            docker pull "${{ env.IMAGE_NAME }}:latest"

            docker network create "taskrit-network" || true
            docker volume create "${{ env.MONGO_VOLUME_NAME }}" || true

            docker stop "${{ env.MONGO_CONTAINER_NAME }}" || true
            docker rm "${{ env.MONGO_CONTAINER_NAME }}" || true
            docker stop "${{ env.CONTAINER_NAME }}" || true
            docker rm "${{ env.CONTAINER_NAME }}" || true

            docker run -d \
              --name "${{ env.MONGO_CONTAINER_NAME }}" \
              --network "taskrit-network" \
              --restart unless-stopped \
              -e MONGO_INITDB_DATABASE=taskrit \
              -e MONGO_INITDB_ROOT_USERNAME="${{ secrets.MONGODB_USER }}" \
              -e MONGO_INITDB_ROOT_PASSWORD="${{ secrets.MONGODB_PASSWORD }}" \
              -v "${{ env.MONGO_VOLUME_NAME }}:/data/db" \
              --health-cmd='echo "db.runCommand(\"ping\").ok" | mongosh localhost:27017/test --quiet' \
              --health-interval=10s \
              --health-timeout=5s \
              --health-retries=10 \
              mongo:8.2.5

            until [ "$(docker inspect -f '{{.State.Health.Status}}' "${{ env.MONGO_CONTAINER_NAME }}")" = "healthy" ]; do
              echo "Waiting for MongoDB to become healthy..."
              sleep 3
            done

            docker run -d \
              --name "${{ env.CONTAINER_NAME }}" \
              --network "taskrit-network" \
              --restart unless-stopped \
              -e MONGODB_URI="mongodb://${{ secrets.MONGODB_USER }}:${{ secrets.MONGODB_PASSWORD }}@${{ env.MONGO_CONTAINER_NAME }}:27017/taskrit?authSource=admin" \
              -e JWT_ACCESS_SECRET="${{ secrets.JWT_ACCESS_SECRET }}" \
              -e JWT_REFRESH_SECRET="${{ secrets.JWT_REFRESH_SECRET }}" \
              -e NODE_ENV=production \
              -p "${{ secrets.SERVER_PORT }}:${{ env.CONTAINER_PORT }}" \
              "${{ env.IMAGE_NAME }}:latest"
          EOF
