name: Build and Deploy Backend

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/taskrit-backend
  CONTAINER_NAME: taskrit-backend
  CONTAINER_PORT: 3000

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          MONGO_URI="${{ secrets.MONGODB_URI }}"

          if [ -z "${{ secrets.MONGODB_URI }}" ]; then
            echo "::error::Missing required secret: MONGODB_URI"
            exit 1
          fi
          if [[ "$MONGO_URI" == *"localhost"* ]] || [[ "$MONGO_URI" == *"127.0.0.1"* ]] || [[ "$MONGO_URI" == *"::1"* ]]; then
            echo "::error::MONGODB_URI points to localhost. Use a host reachable from the backend container (e.g. mongodb service name, server IP, or managed DB endpoint)."
            exit 1
          fi
          if [ -z "${{ secrets.JWT_ACCESS_SECRET }}" ]; then
            echo "::error::Missing required secret: JWT_ACCESS_SECRET"
            exit 1
          fi
          if [ -z "${{ secrets.JWT_REFRESH_SECRET }}" ]; then
            echo "::error::Missing required secret: JWT_REFRESH_SECRET"
            exit 1
          fi

      - name: Configure SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          timeout 15s ssh-keyscan -T 5 -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy on server
        shell: bash
        run: |
          set -euo pipefail
          ssh -o BatchMode=yes -o ConnectTimeout=15 -o StrictHostKeyChecking=accept-new -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" << 'EOF'
            set -e
            docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" -p "${{ secrets.GHCR_PAT }}"
            docker pull "${{ env.IMAGE_NAME }}:latest"

            docker stop "${{ env.CONTAINER_NAME }}" || true
            docker rm "${{ env.CONTAINER_NAME }}" || true

            docker run -d \
              --name "${{ env.CONTAINER_NAME }}" \
              --restart unless-stopped \
              -e MONGODB_URI="${{ secrets.MONGODB_URI }}" \
              -e JWT_ACCESS_SECRET="${{ secrets.JWT_ACCESS_SECRET }}" \
              -e JWT_REFRESH_SECRET="${{ secrets.JWT_REFRESH_SECRET }}" \
              -e NODE_ENV=production \
              -p "${{ secrets.SERVER_PORT }}:${{ env.CONTAINER_PORT }}" \
              "${{ env.IMAGE_NAME }}:latest"
          EOF
